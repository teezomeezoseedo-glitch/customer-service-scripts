<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content auth-modal">
            <h2>Script Hub</h2>
            <div id="authContent"></div>
        </div>
    </div>

    <!-- User Panel -->
    <div class="user-panel">
        <div class="user-info">
            <span id="currentUser">Loading...</span>
            <button id="logoutBtn" class="user-btn">Sign Out</button>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <div class="header-top">
                <h1>Script Manager</h1>
                <div class="theme-picker">
                    <label for="themeSelect">Theme:</label>
                    <select id="themeSelect" class="theme-select">
                        <option value="dark-pro">Dark Pro</option>
                        <option value="light-pro">Light Pro</option>
                        <option value="ocean">Ocean</option>
                        <option value="forest">Forest</option>
                        <option value="midnight">Midnight</option>
                        <option value="slate">Slate</option>
                        <option value="neon-pro-blue">Neon Blue Pro</option>
                        <option value="neon-pro-green">Neon Green Pro</option>
                    </select>
                </div>
            </div>
            <p>Professional Script Management</p>
        </header>

        <div class="controls">
            <input 
                type="text" 
                id="searchInput" 
                class="search-box" 
                placeholder="Search scripts..."
            >
            <select id="categoryFilter" class="category-filter">
                <option value="">All Categories</option>
            </select>
            <button class="btn-add-script" id="addScriptBtn" style="display:none;">+ Add Script</button>
        </div>

        <div class="scripts-grid" id="scriptsGrid">
            <!-- Scripts will be loaded here -->
        </div>

        <div class="editor-section">
            <button class="btn-edit-mode" id="editModeBtn" style="display:none;">JSON Editor</button>
        </div>
    </div>

    <!-- Add/Edit Script Modal -->
    <div id="scriptFormModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeFormModal">&times;</span>
            <h2 id="formTitle">Add Script</h2>
            <form id="scriptForm">
                <div class="form-group">
                    <label for="scriptTitle">Title:</label>
                    <input type="text" id="scriptTitle" placeholder="Enter title" required>
                </div>
                <div class="form-group">
                    <label for="scriptCategory">Category:</label>
                    <input type="text" id="scriptCategory" placeholder="Enter category" required>
                </div>
                <div class="form-group">
                    <label for="scriptContent">Content:</label>
                    <textarea id="scriptContent" placeholder="Enter content..." rows="8" required></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-save">Save</button>
                    <button type="button" class="btn btn-cancel" id="cancelFormBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal (JSON) -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeEditModal">&times;</span>
            <h2>JSON Editor</h2>
            <textarea id="scriptsEditor" class="scripts-editor"></textarea>
            <div class="modal-buttons">
                <button class="btn btn-save" id="saveBtn">Save</button>
                <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
