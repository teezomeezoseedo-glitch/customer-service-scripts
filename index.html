<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- User Panel -->
    <div class="user-panel">
        <div class="user-info">
            <span id="currentUser">Guest</span>
            <button id="userBtn" class="user-btn">👤 Switch User</button>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <div class="header-top">
                <h1>🎮 Script Hub</h1>
                <div class="theme-picker">
                    <label for="themeSelect">🎨 Theme:</label>
                    <select id="themeSelect" class="theme-select">
                        <option value="neon-blue">Neon Blue</option>
                        <option value="neon-pink">Neon Pink</option>
                        <option value="neon-green">Neon Green</option>
                        <option value="neon-purple">Neon Purple</option>
                        <option value="neon-orange">Neon Orange</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="matrix">Matrix</option>
                    </select>
                </div>
            </div>
            <p>Your personal script collection</p>
        </header>

        <div class="controls">
            <input 
                type="text" 
                id="searchInput" 
                class="search-box" 
                placeholder="Search scripts..."
            >
            <select id="categoryFilter" class="category-filter">
                <option value="">All Categories</option>
            </select>
            <button class="btn-add-script" id="addScriptBtn">➕ Add Script</button>
        </div>

        <div class="scripts-grid" id="scriptsGrid">
            <!-- Scripts will be loaded here -->
        </div>

        <div class="editor-section">
            <button class="btn-edit-mode" id="editModeBtn">⚙️ JSON Editor</button>
        </div>
    </div>

    <!-- User Switch Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeUserModal">&times;</span>
            <h2>👤 Switch User</h2>
            <div class="user-list" id="userList"></div>
            <div class="form-group">
                <label for="newUsername">Create New User:</label>
                <div class="username-input">
                    <input type="text" id="newUsername" placeholder="Enter username...">
                    <button class="btn btn-save" id="createUserBtn">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Script Modal -->
    <div id="scriptFormModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeFormModal">&times;</span>
            <h2 id="formTitle">Add New Script</h2>
            <form id="scriptForm">
                <div class="form-group">
                    <label for="scriptTitle">Title:</label>
                    <input type="text" id="scriptTitle" placeholder="e.g., Funny Joke" required>
                </div>
                <div class="form-group">
                    <label for="scriptCategory">Category:</label>
                    <input type="text" id="scriptCategory" placeholder="e.g., Jokes" required>
                </div>
                <div class="form-group">
                    <label for="scriptContent">Content:</label>
                    <textarea id="scriptContent" placeholder="Enter your script here..." rows="6" required></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-save">Save Script</button>
                    <button type="button" class="btn btn-cancel" id="cancelFormBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal (JSON) -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeEditModal">&times;</span>
            <h2>⚙️ JSON Editor</h2>
            <textarea id="scriptsEditor" class="scripts-editor"></textarea>
            <div class="modal-buttons">
                <button class="btn btn-save" id="saveBtn">Save Changes</button>
                <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
